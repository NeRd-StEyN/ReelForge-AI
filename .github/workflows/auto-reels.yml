name: Auto Reels

on:
  workflow_dispatch:
  schedule:
    # 09:00 IST
    - cron: '30 3 * * *'
    # 14:00 IST
    - cron: '30 8 * * *'
    # 20:00 IST
    - cron: '30 14 * * *'

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
      OPENROUTER_FALLBACK_MODELS: ${{ secrets.OPENROUTER_FALLBACK_MODELS }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
      CONTENT_DOMAIN: ${{ secrets.CONTENT_DOMAIN }}
      INSTA_USERNAME: ${{ secrets.INSTA_USERNAME }}
      INSTA_PASSWORD: ${{ secrets.INSTA_PASSWORD }}
      ENABLE_INSTAGRAM_ANALYTICS: ${{ secrets.ENABLE_INSTAGRAM_ANALYTICS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore feedback history cache
        uses: actions/cache/restore@v4
        with:
          path: data/insta_analytics_history.jsonl
          key: analytics-history-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            analytics-history-${{ github.ref_name }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate and post one reel
        run: |
          python auto_scheduler.py --mode batch --count 1

      - name: Save feedback history cache
        uses: actions/cache/save@v4
        with:
          path: data/insta_analytics_history.jsonl
          key: analytics-history-${{ github.ref_name }}-${{ github.run_id }}
