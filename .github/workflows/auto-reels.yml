name: Auto Reels

on:
  workflow_dispatch:
  schedule:
    # TIER 1 SLOTS — PROVEN TOP PERFORMERS
    # 11:00 IST = 05:30 UTC — Morning peak (fresh scroll, high engagement)
    - cron: '30 5 * * *'
    # 20:00 IST = 14:30 UTC — Evening peak (break time scroll)
    - cron: '30 14 * * *'

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
      CONTENT_DOMAIN: ${{ secrets.CONTENT_DOMAIN }}
      INSTA_USERNAME: ${{ secrets.INSTA_USERNAME }}
      INSTA_PASSWORD: ${{ secrets.INSTA_PASSWORD }}
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      MAKE_ANALYTICS_WEBHOOK_URL: ${{ secrets.MAKE_ANALYTICS_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore feedback history cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/insta_analytics_history.jsonl
            data/pexels_used_ids.json
            data/used_topics.jsonl
            data/reel_outcomes.jsonl
            data/voice_index.txt
            data/pending_posts.jsonl
            data/analytics_fail_count.txt
            data/last_analytics_fetch.txt
          key: reelforge-data-${{ github.ref_name }}
          restore-keys: |
            reelforge-data-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate and post one reel
        run: |
          python auto_scheduler.py --mode batch --count 1

      - name: Save feedback history cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/insta_analytics_history.jsonl
            data/pexels_used_ids.json
            data/used_topics.jsonl
            data/reel_outcomes.jsonl
            data/voice_index.txt
            data/pending_posts.jsonl
            data/analytics_fail_count.txt
            data/last_analytics_fetch.txt
          key: reelforge-data-${{ github.ref_name }}
