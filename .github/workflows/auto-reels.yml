name: Auto Reels

on:
  workflow_dispatch:
  schedule:
    # 14:00 IST = 08:30 UTC — PROVEN BEST SLOT (top reel posted 2:07 PM IST got 3505 views)
    - cron: '30 8 * * *'
    # 17:30 IST = 12:00 UTC — PROVEN 2ND BEST (2nd top reel posted 5:57 PM IST got 3463 views)
    - cron: '0 12 * * *'

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
      CONTENT_DOMAIN: ${{ secrets.CONTENT_DOMAIN }}
      INSTA_USERNAME: ${{ secrets.INSTA_USERNAME }}
      INSTA_PASSWORD: ${{ secrets.INSTA_PASSWORD }}
      INSTA_SESSION_ID: ${{ secrets.INSTA_SESSION_ID }}
      ENABLE_INSTAGRAM_ANALYTICS: "true"  # Always create client — needed for Story posting
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      INSTA_SESSION: ${{ secrets.INSTA_SESSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore feedback history cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/insta_analytics_history.jsonl
            data/pexels_used_ids.json
            data/used_topics.jsonl
            data/reel_outcomes.jsonl
            data/voice_index.txt
          key: reelforge-data-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            reelforge-data-${{ github.ref_name }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sleep for random jitter
        run: sleep $((RANDOM % 900))

      - name: Write Instagram session file
        if: env.INSTA_SESSION != ''
        run: echo "$INSTA_SESSION" > insta_session.json

      - name: Generate and post one reel
        run: |
          python auto_scheduler.py --mode batch --count 1

      - name: Save feedback history cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/insta_analytics_history.jsonl
            data/pexels_used_ids.json
            data/used_topics.jsonl
            data/reel_outcomes.jsonl
            data/voice_index.txt
          key: reelforge-data-${{ github.ref_name }}-${{ github.run_id }}
