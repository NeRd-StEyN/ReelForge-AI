name: Auto Reels

on:
  workflow_dispatch:
  schedule:
    # 09:00 IST
    - cron: '30 3 * * *'
    # 14:00 IST
    - cron: '30 8 * * *'
    # 20:00 IST
    - cron: '30 14 * * *'

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
      CONTENT_DOMAIN: ${{ secrets.CONTENT_DOMAIN }}
      ENABLE_INSTAGRAM_ANALYTICS: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate and post one reel
        run: |
          python auto_scheduler.py --mode batch --count 1
